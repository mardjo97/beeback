@if (movedHive) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(movedHive.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="movedHiveDeleteDialogHeading" jhiTranslate="entity.delete.title">Confirm delete operation</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error></jhi-alert-error>
      <p id="jhi-delete-movedHive-heading" jhiTranslate="beebackApp.movedHive.delete.question" [translateValues]="{ id: movedHive.id }">
        Are you sure you want to delete Moved Hive {{ movedHive.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
      </button>

      <button id="jhi-confirm-delete-movedHive" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times"></fa-icon>&nbsp;<span jhiTranslate="entity.action.delete">Delete</span>
      </button>
    </div>
  </form>
}
